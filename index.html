<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugdho's New Startpage</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* একদম নতুন নীল গ্রেডিয়েন্ট ব্যাকগ্রাউন্ড */
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
        }
        .test-badge {
            position: absolute;
            top: 20px;
            background: #ff4757;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #clock {
            font-size: 4.5rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }
        .search-box {
            width: 85%;
            max-width: 550px;
            padding: 18px 25px;
            border-radius: 30px;
            border: none;
            font-size: 1.2rem;
            outline: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            transition: 0.3s;
        }
        .search-box:focus {
            transform: scale(1.02);
        }
        .links {
            margin-top: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .link-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }
    </style>
</head>
<body>

    <div class="test-badge">🚀 Vercel Test Mode Active</div>
    
    <h1>Welcome, Mugdho!</h1>
    <div id="clock">00:00:00</div>
    
    <input type="text" class="search-box" id="search" placeholder="Google এ কিছু খুঁজুন..." onkeypress="if(event.key === 'Enter' && this.value) window.location.href='https://www.google.com/search?q='+encodeURIComponent(this.value)">
    
    <div class="links">
        <a href="https://youtube.com" class="link-btn">▶️ YouTube</a>
        <a href="https://chatgpt.com" class="link-btn">🤖 ChatGPT</a>
        <a href="https://facebook.com" class="link-btn">👥 Facebook</a>
        <a href="https://github.com" class="link-btn">🐙 GitHub</a>
    </div>

    <script>
        // লাইভ ঘড়ির জন্য জাভাস্ক্রিপ্ট
        function updateTime() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            let seconds = now.getSeconds();
            let ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            seconds = seconds < 10 ? '0' + seconds : seconds;
            
            document.getElementById('clock').innerText = `${hours}:${minutes}:${seconds} ${ampm}`;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
