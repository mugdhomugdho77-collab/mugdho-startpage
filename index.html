<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugdho Portal</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b0b21, #161b40, #0f172a);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }
        .top-banner {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            text-align: center;
        }
        .brand-header-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: -4px;
        }
        .brand-robot-logo {
            width: 47px;
            height: 47px;
            object-fit: contain;
            filter: drop-shadow(0 4px 10px rgba(0, 255, 255, 0.3));
        }
        .top-banner h1 {
            font-size: 29px;
            margin: 0;
            background: linear-gradient(30deg, #00d2ff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .top-banner p {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin: 0;
        }
        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        .search-select {
            background: transparent;
            border: none;
            color: #00d2ff;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .search-select option {
            background: #0b0b21;
            color: #fff;
        }
        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .search-btn {
            background: none;
            border: none;
            color: #00d2ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
        }
        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 14px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.25s ease;
            backdrop-filter: blur(5px);
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(0, 210, 255, 0.3);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            font-size: 20px;
            background: rgba(255, 255, 255, 0.06);
        }
        .card span {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .footer {
            margin-top: auto;
            padding: 15px 0;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            text-align: center;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-banner">
            <div class="brand-header-wrapper">
                <img src="https://api.iconify.design/fluent-emoji-flat:robot.svg" alt="Robot Logo" class="brand-robot-logo">
                <h1>Mugdho Portal</h1>
            </div>
            <p>Customized Web Dashboard</p>
        </div>

        <form class="search-box" action="https://www.google.com/search" method="GET" target="_blank" id="searchForm">
            <select class="search-select" id="searchEngine">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://www.youtube.com/results?search_query=">YouTube</option>
                <option value="https://github.com/search?q=">GitHub</option>
            </select>
            <input type="text" class="search-input" name="q" placeholder="Search the web..." autocomplete="off">
            <button type="submit" class="search-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </form>

        <div class="grid-container">
            <a href="https://chatgpt.com" class="card" target="_blank">
                <div class="icon-box">💬</div>
                <span>ChatGPT</span>
            </a>
            <a href="https://gemini.google.com" class="card" target="_blank">
                <div class="icon-box">✨</div>
                <span>Gemini</span>
            </a>
            <a href="https://github.com" class="card" target="_blank">
                <div class="icon-box">🐙</div>
                <span>GitHub</span>
            </a>
            <a href="https://youtube.com" class="card" target="_blank">
                <div class="icon-box" style="color: #ff4d4d;">▶️</div>
                <span>YouTube</span>
            </a>
            <a href="https://facebook.com" class="card" target="_blank">
                <div class="icon-box" style="color: #1877f2;">📘</div>
                <span>Facebook</span>
            </a>
            <a href="https://web.whatsapp.com" class="card" target="_blank">
                <div class="icon-box" style="color: #25d366;">💬</div>
                <span>WhatsApp</span>
            </a>
            <a href="https://vercel.com" class="card" target="_blank">
                <div class="icon-box">▲</div>
                <span>Vercel</span>
            </a>
            <a href="https://mail.google.com" class="card" target="_blank">
                <div class="icon-box">📧</div>
                <span>Gmail</span>
            </a>
        </div>
    </div>

    <div class="footer">
        Design with ❤️ Dash Dashboard by Mugdho.
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchEngine = document.getElementById('searchEngine');
        const searchInput = searchForm.querySelector('.search-input');

        searchEngine.addEventListener('change', function() {
            searchForm.action = this.value;
        });

        searchForm.addEventListener('submit', function(e) {
            if(searchEngine.value.includes('youtube')) {
                searchInput.name = 'search_query';
            } else {
                searchInput.name = 'q';
            }
        });
    </script>
</body>
</html>
