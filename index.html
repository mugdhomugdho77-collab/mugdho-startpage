<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- কাস্টম মোডের স্টাইল ও মেটা ট্যাগ -->
    <title>Mugdho Startpage - Your Ultimate Web Portal & Study Hub</title>
    <meta name="description" content="Mugdho Startpage is a fast, custom web launcher and portal to access your favorite websites, tools, and Mugdho Study Hub instantly.">
    <meta name="keywords" content="Mugdho Study Hub, Web Launcher, Custom Homepage, BL College, Study Material, Online Portal">
    <meta name="author" content="Mugdho">

    <!-- কাস্টম স্টাইল ও ডিজাইন -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }

        /* লোগো বা হেডিং */
        .logo-title {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        /* সার্চ বার স্টাইল */
        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            padding: 12px 25px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            transition: all 0.3s ease;
            margin-bottom: 40px;
        }

        .search-box:focus-within {
            border-color: #00dbde;
            box-shadow: 0 0 20px rgba(0, 219, 222, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="logo-title">Mugdho Portal</h1>
        <div class="search-box">
            <!-- এখানে সার্চ অপশন বা শর্টকাটগুলো থাকবে -->
        </div>
    </div>
</body>
</html>
