<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugdho Portal - Ultimate Browser</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: all 0.3s ease;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #090618, #150f2e, #05030a);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 70px;
        }
        .body-incognito {
            background: linear-gradient(135deg, #05020a, #12091f, #020105) !important;
        }
        .main-wrapper {
            width: 100%;
            max-width: 650px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }
        .desktop-mode {
            max-width: 100% !important;
            padding: 20px 40px !important;
        }

        /* 3D Exclusive Portal Header */
        .portal-header-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            padding: 10px 0;
        }
        .header-content-flex {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            position: relative;
            z-index: 2;
        }
        .robot-3d-icon {
            width: 75px;
            height: 75px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.6));
            animation: floatRobot 3s ease-in-out infinite;
        }
        @keyframes floatRobot {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .portal-title-text {
            text-align: center;
        }
        .title-mugdho {
            font-size: 38px;
            font-weight: 900;
            font-family: 'Brush Script MT', cursive, sans-serif;
            background: linear-gradient(to right, #00d2ff, #7928ca, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(121, 40, 202, 0.4);
            line-height: 1.1;
        }
        .title-portal {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5, #ff007f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 15px rgba(0, 210, 255, 0.4);
        }

        /* Browser Toolbar */
        .browser-toolbar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }
        .tool-btn span {
            font-size: 16px;
        }
        .tool-btn:hover {
            color: #00d2ff;
            transform: scale(1.05);
        }

        /* Advanced Omnibox */
        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 35px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            backdrop-filter: blur(15px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .search-box:focus-within {
            border-color: #00d2ff;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.25);
        }
        .engine-icon-container {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .engine-logo {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
        .search-select {
            background: transparent;
            border: none;
            color: #00d2ff;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .search-select option {
            background: #1b143f;
            color: #fff;
        }
        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .search-action-icons {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .action-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #00d2ff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon-btn:hover {
            transform: scale(1.15);
        }

        /* App Grid Container */
        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 22px;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 18px;
            padding: 14px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            transform: translateY(-4px);
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(0, 210, 255, 0.4);
        }
        .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            background: rgba(255, 255, 255, 0.06);
        }
        .icon-box img {
            width: 28px;
            height: 28px;
            object-fit: contain;
        }
        .card span {
            font-size: 11px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Google Discover Infinite Feed Style */
        .news-section-title {
            width: 100%;
            font-size: 15px;
            font-weight: 700;
            color: #00d2ff;
            margin-bottom: 12px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .news-feed-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .news-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px;
            display: flex;
            gap: 12px;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        .news-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 210, 255, 0.3);
        }
        .news-img {
            width: 90px;
            height: 70px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
        }
        .news-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .news-content h3 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .news-content p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
        }

        .loading-spinner {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            color: #00d2ff;
            display: none;
        }

        /* Privacy Banner */
        .privacy-banner {
            width: 100%;
            background: rgba(0, 210, 255, 0.08);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .privacy-text h4 {
            font-size: 13px;
            color: #7dd3fc;
            margin-bottom: 2px;
        }
        .privacy-text p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .privacy-badge {
            background: #0284c7;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            border: none;
        }

        /* Bottom Floating Browser Navigation Bar */
        .bottom-nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(15, 12, 27, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
            backdrop-filter: blur(15px);
            z-index: 999;
        }
        .nav-item {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            cursor: pointer;
        }
        .nav-item span {
            font-size: 18px;
        }
        .nav-item:hover {
            color: #00d2ff;
        }

        /* Popup Notification */
        #notificationModal {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(15, 12, 27, 0.95);
            border: 1px solid #00d2ff;
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #notificationModal.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div id="notificationModal">⚡ Notification Message</div>

    <div class="main-wrapper" id="mainContainer">
        <!-- 3D Exclusive Portal Header -->
        <div class="portal-header-box">
            <div class="header-content-flex">
                <img src="https://api.iconify.design/fluent-emoji-flat:robot.svg" class="robot-3d-icon" alt="3D Robot">
                <div class="portal-title-text">
                    <div class="title-mugdho">Mugdho</div>
                    <div class="title-portal">Portal</div>
                </div>
            </div>
        </div>

        <!-- Browser Action Toolbar -->
        <div class="browser-toolbar">
            <button class="tool-btn" id="vpnBtn" onclick="toggleVPN()">
                <span id="vpnIcon">🛡️</span>VPN Off
            </button>
            <button class="tool-btn" id="incognitoBtn" onclick="toggleIncognito()">
                <span id="incognitoIcon">🕵️‍♂️</span>Incognito
            </button>
            <button class="tool-btn" id="desktopBtn" onclick="toggleDesktop()">
                <span id="desktopIcon">💻</span>Desktop
            </button>
            <button class="tool-btn" onclick="window.location.reload()">
                <span>🔄</span>Refresh
            </button>
            <button class="tool-btn" onclick="showMsg('⭐ Bookmarked successfully!')">
                <span>⭐</span>Bookmark
            </button>
        </div>

        <!-- Advanced Omnibox -->
        <form class="search-box" action="https://www.google.com/search" method="GET" target="_blank" id="searchForm">
            <div class="engine-icon-container">
                <img id="selectedEngineLogo" src="https://api.iconify.design/logos:google-icon.svg" class="engine-logo" alt="Engine Icon">
                <select class="search-select" id="searchEngine" onchange="updateEngineIcon(this)">
                    <option value="https://www.google.com/search?q=" data-icon="https://api.iconify.design/logos:google-icon.svg">Google</option>
                    <option value="https://duckduckgo.com/?q=" data-icon="https://api.iconify.design/logos:duckduckgo.svg">DuckDuckGo</option>
                    <option value="https://yandex.com/search/?text=" data-icon="https://api.iconify.design/logos:yandex.svg">Yandex</option>
                    <option value="https://www.bing.com/search?q=" data-icon="https://api.iconify.design/logos:microsoft-icon.svg">Bing</option>
                </select>
            </div>
            <input type="text" class="search-input" id="searchInput" name="q" placeholder="Google এ সার্চ করুন অথবা URL লিখুন..." autocomplete="off">
            <div class="search-action-icons">
                <button type="button" class="action-icon-btn" onclick="startVoiceSearch()" title="Voice Search">🎙️</button>
                <button type="button" class="action-icon-btn" onclick="openGoogleLens()" title="Google Lens">📷</button>
            </div>
        </form>

        <!-- App Grid -->
        <div class="grid-container">
            <a href="https://chatgpt.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:openai-icon.svg" alt="ChatGPT"></div>
                <span>ChatGPT</span>
            </a>
            <a href="https://gemini.google.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:google-gemini.svg" alt="Gemini"></div>
                <span>Gemini</span>
            </a>
            <a href="https://github.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:github-icon.svg" alt="GitHub"></div>
                <span>GitHub</span>
            </a>
            <a href="https://youtube.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:youtube-icon.svg" alt="YouTube"></div>
                <span>YouTube</span>
            </a>
            <a href="https://facebook.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:facebook.svg" alt="Facebook"></div>
                <span>Facebook</span>
            </a>
            <a href="https://web.whatsapp.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:whatsapp-icon.svg" alt="WhatsApp"></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://vercel.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:vercel-icon.svg" alt="Vercel"></div>
                <span>Vercel</span>
            </a>
            <a href="https://mail.google.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:google-gmail.svg" alt="Gmail"></div>
                <span>Gmail</span>
            </a>
        </div>

        <!-- Google Discover Feed Container -->
        <div class="news-section-title">📰 Google Discover & Trending Feed</div>
        <div class="news-feed-container" id="newsFeed">
            <!-- Dynamic items will load here -->
        </div>

        <div class="loading-spinner" id="loadingSpinner">⏳ Loading more news & movie clips...</div>

        <!-- Privacy Banner -->
        <div class="privacy-banner">
            <div class="privacy-text">
                <h4 id="privacyTitle">Private Browsing Mode</h4>
                <p id="privacyDesc">No search history, cookies or cache are saved.</p>
            </div>
            <button class="privacy-badge" id="privacyBadgeState">PRO ON</button>
        </div>
    </div>

    <!-- Bottom Browser Navigation Bar -->
    <div class="bottom-nav-bar">
        <button class="nav-item" onclick="goBack()">
            <span>⬅️</span>Back
        </button>
        <button class="nav-item" onclick="goHome()">
            <span>🏠</span>Home
        </button>
        <button class="nav-item" onclick="showMsg('📑 Active Tabs Overview')">
            <span>📑</span>Tabs
        </button>
        <button class="nav-item" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <span>⬆️</span>Top
        </button>
    </div>

    <script>
        // Infinite Discover Feed Pool (News, Tech, Movies)
        const feedItemsPool = [
            { title: "2026 FIFA World Cup: Global Teams Gear Up for the Ultimate Clash in North America", category: "Sports • 1 hour ago", img: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=150", link: "https://www.google.com/search?q=2026+FIFA+World+Cup" },
            { title: "Bangladesh Tech Sector Expands Rapidly with Next-Gen AI and Software Innovations", category: "Technology • 3 hours ago", img: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=150", link: "https://www.google.com/search?q=Bangladesh+tech+news" },
            { title: "Top 10 Thriller & Horror Masterpieces You Need to Watch This Season", category: "Entertainment & Movies • 4 hours ago", img: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=150", link: "https://www.google.com/search?q=best+horror+thriller+movies" },
            { title: "Global Stock Markets React to Latest Breakthroughs in Artificial Intelligence", category: "World Business • 5 hours ago", img: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?w=150", link: "https://www.google.com/search?q=global+markets+ai" },
            { title: "Exploring the Scenic Beauty and Modern Growth of Khulna Division", category: "National • 6 hours ago", img: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=150", link: "https://www.google.com/search?q=Khulna+Bangladesh" },
            { title: "Latest Smartphone Camera Technologies and Mobile Photography Tips in 2026", category: "Gadgets • 7 hours ago", img: "https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=150", link: "https://www.google.com/search?q=smartphone+camera+tech" },
            { title: "Hollywood Blockbuster Movie Trailers and Upcoming Sci-Fi Releases", category: "Movie Clips • 8 hours ago", img: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=150", link: "https://www.google.com/search?q=upcoming+movies+2026" }
        ];

        const newsFeed = document.getElementById('newsFeed');
        const loadingSpinner = document.getElementById('loadingSpinner');
        let batchCount = 0;

        function loadMoreContent() {
            loadingSpinner.style.display = 'block';
            setTimeout(() => {
                feedItemsPool.forEach((item, index) => {
                    const card = document.createElement('ahref' in item ? 'a' : 'div');
                    card.className = 'news-card';
                    card.href = item.link;
                    card.target = '_blank';
                    card.innerHTML = `
                        <img src="${item.img}" class="news-img" alt="News Image">
                        <div class="news-content">
                            <h3>${item.title}</h3>
                            <p>${item.category} • Batch ${batchCount + 1}</p>
                        </div>
                    `;
                    newsFeed.appendChild(card);
                });
                batchCount++;
                loadingSpinner.style.display = 'none';
            }, 600);
        }

        // Initial Load
        loadMoreContent();
        loadMoreContent();

        // Infinite Scroll Event Listener (Scroll down to load more automatically)
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                if (loadingSpinner.style.display !== 'block') {
                    loadMoreContent();
                }
            }
        });

        // Search Engine Selector
        const searchForm = document.getElementById('searchForm');
        const searchEngine = document.getElementById('searchEngine');
        const searchInput = document.getElementById('searchInput');
        const selectedEngineLogo = document.getElementById('selectedEngineLogo');

        function updateEngineIcon(selectElement) {
            const selectedOption = selectElement.options[selectElement.selectedIndex];
            selectedEngineLogo.src = selectedOption.getAttribute('data-icon');
            searchForm.action = selectedOption.value;
            let nameAttr = 'q';
            if(selectedOption.value.includes('yandex')) nameAttr = 'text';
            searchInput.name = nameAttr;
        }

        // Voice Search Integration
        function startVoiceSearch() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showMsg('❌ Voice search is not supported in this browser.');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'bn-BD'; 
            recognition.onstart = function() {
                showMsg('🎙️ Listening... Speak now!');
            };
            recognition.onresult = function(event) {
                const speechToText = event.results[0][0].transcript;
                searchInput.value = speechToText;
                showMsg('✅ Recognized: ' + speechToText);
                searchForm.submit();
            };
            recognition.onerror = function() {
                showMsg('⚠️ Voice recognition error. Try again.');
            };
            recognition.start();
        }

        function openGoogleLens() {
            showMsg('📷 Opening Google Lens Scanner...');
            window.open('https://lens.google.com', '_blank');
        }

        function showMsg(text) {
            const modal = document.getElementById('notificationModal');
            modal.innerText = text;
            modal.classList.add('show');
            setTimeout(() => {
                modal.classList.remove('show');
            }, 2500);
        }

        let vpnActive = false;
        function toggleVPN() {
            vpnActive = !vpnActive;
            const btn = document.getElementById('vpnBtn');
            const icon = document.getElementById('vpnIcon');
            if(vpnActive) {
                btn.style.color = '#10b981';
                icon.innerText = '🌐';
                showMsg('🔒 Secure VPN Connected');
            } else {
                btn.style.color = '#fff';
                icon.innerText = '🛡️';
                showMsg('🛡️ VPN Disconnected');
            }
        }

        let incognitoActive = false;
        function toggleIncognito() {
            incognitoActive = !incognitoActive;
            const body = document.body;
            const btn = document.getElementById('incognitoBtn');
            const pTitle = document.getElementById('privacyTitle');
            const pDesc = document.getElementById('privacyDesc');
            
            if(incognitoActive) {
                body.classList.add('body-incognito');
                btn.style.color = '#a855f7';
                pTitle.innerText = "🔒 Incognito PRO Active";
                pDesc.innerText = "Encrypted session. Your digital footprint is hidden.";
                showMsg('🕵️‍♂️ Incognito Mode Activated!');
            } else {
                body.classList.remove('body-incognito');
                btn.style.color = '#fff';
                pTitle.innerText = "Private Browsing Mode";
                pDesc.innerText = "No search history, cookies or cache are saved.";
                showMsg('💡 Switched back to Normal Mode.');
            }
        }

        let desktopActive = false;
        function toggleDesktop() {
            desktopActive = !desktopActive;
            const container = document.getElementById('mainContainer');
            const btn = document.getElementById('desktopBtn');
            if(desktopActive) {
                container.classList.add('desktop-mode');
                btn.style.color = '#3b82f6';
                showMsg('💻 Switched to Desktop View');
            } else {
                container.classList.remove('desktop-mode');
                btn.style.color = '#fff';
                showMsg('📱 Switched back to Mobile View');
            }
        }

        function goBack() {
            if(window.history.length > 1) {
                window.history.back();
            } else {
                showMsg('⬅️ No previous page in history');
            }
        }

        function goHome() {
            window.scrollTo({top: 0, behavior: 'smooth'});
            searchInput.value = '';
            showMsg('🏠 Welcome back to Mugdho Portal Home');
