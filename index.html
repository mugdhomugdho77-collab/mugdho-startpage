<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugdho Browser Portal</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c1b, #1b143f, #090612);
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 650px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }
        /* UC/Firefox hybrid top banner */
        .top-banner {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            text-align: center;
        }
        .brand-header-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 4px;
        }
        .brand-robot-logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
            filter: drop-shadow(0 0 12px rgba(0, 210, 255, 0.5));
        }
        .top-banner h1 {
            font-size: 30px;
            background: linear-gradient(30deg, #ff7e5f, #feb47b, #00d2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: 0.8px;
        }
        .top-banner p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Browser Toolbar / Quick Action Bar (UC & Firefox style features) */
        .browser-toolbar {
            width: 100%;
            display: flex;
            justify-content: space-around;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 10px;
            margin-bottom: 18px;
            backdrop-filter: blur(10px);
        }
        .tool-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .tool-btn span {
            font-size: 16px;
        }
        .tool-btn:hover {
            color: #00d2ff;
            transform: scale(1.05);
        }

        /* Omnibox / Search Bar */
        .search-box {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 35px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            backdrop-filter: blur(15px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }
        .search-box:focus-within {
            border-color: #ff7e5f;
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 25px rgba(255, 126, 95, 0.25);
        }
        .search-select {
            background: transparent;
            border: none;
            color: #ff7e5f;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }
        .search-select option {
            background: #1b143f;
            color: #fff;
        }
        .search-input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 15px;
            outline: none;
        }
        .search-input::placeholder {
            color: rgba(255,255,255,0.4);
        }
        .search-btn {
            background: none;
            border: none;
            color: #ff7e5f;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
        }

        /* App Grid Container (Official Style) */
        .grid-container {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.07);
            border-radius: 20px;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.25s ease;
            backdrop-filter: blur(8px);
        }
        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 126, 95, 0.4);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);
        }
        .icon-box {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.06);
        }
        .icon-box img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }
        .card span {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.85);
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Incognito / Privacy Notice Banner (UC style) */
        .privacy-banner {
            width: 100%;
            background: rgba(138, 43, 226, 0.12);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 14px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }
        .privacy-text h4 {
            font-size: 13px;
            color: #d8b4fe;
            margin-bottom: 2px;
        }
        .privacy-text p {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }
        .privacy-badge {
            background: #7c3aed;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }

        .footer {
            margin-top: auto;
            padding: 15px 0;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header Banner with custom robot logo -->
        <div class="top-banner">
            <div class="brand-header-wrapper">
                <img src="https://api.iconify.design/fluent-emoji-flat:robot.svg" alt="Robot Logo" class="brand-robot-logo">
                <h1>Mugdho Portal</h1>
            </div>
            <p>Ultimate Web Browser Dashboard</p>
        </div>

        <!-- UC & Firefox Hybrid Browser Toolbar -->
        <div class="browser-toolbar">
            <button class="tool-btn" onclick="alert('VPN Protected & Active!')"><span>🛡️</span>VPN Pro</button>
            <button class="tool-btn" onclick="toggleIncognito()"><span>🕵️‍♂️</span>Incognito</button>
            <button class="tool-btn" onclick="toggleDesktopSite()"><span>💻</span>Desktop Site</button>
            <button class="tool-btn" onclick="window.location.reload()"><span>🔄</span>Refresh</button>
            <button class="tool-btn" onclick="alert('Added to Bookmarks successfully!')"><span>⭐</span>Bookmark</button>
        </div>

        <!-- Google / UC Omnibox -->
        <form class="search-box" action="https://www.google.com/search" method="GET" target="_blank" id="searchForm">
            <select class="search-select" id="searchEngine">
                <option value="https://www.google.com/search?q=">Google</option>
                <option value="https://www.youtube.com/results?search_query=">YouTube</option>
                <option value="https://github.com/search?q=">GitHub</option>
            </select>
            <input type="text" class="search-input" name="q" placeholder="Search with Google, UC & Firefox style..." autocomplete="off">
            <button type="submit" class="search-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
        </form>

        <!-- Official Icons Grid -->
        <div class="grid-container">
            <a href="https://chatgpt.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:openai-icon.svg" alt="ChatGPT"></div>
                <span>ChatGPT</span>
            </a>
            <a href="https://gemini.google.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:google-gemini.svg" alt="Gemini"></div>
                <span>Gemini</span>
            </a>
            <a href="https://github.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:github-icon.svg" alt="GitHub"></div>
                <span>GitHub</span>
            </a>
            <a href="https://youtube.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:youtube-icon.svg" alt="YouTube"></div>
                <span>YouTube</span>
            </a>
            <a href="https://facebook.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:facebook.svg" alt="Facebook"></div>
                <span>Facebook</span>
            </a>
            <a href="https://web.whatsapp.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:whatsapp-icon.svg" alt="WhatsApp"></div>
                <span>WhatsApp</span>
            </a>
            <a href="https://vercel.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:vercel-icon.svg" alt="Vercel"></div>
                <span>Vercel</span>
            </a>
            <a href="https://mail.google.com" class="card" target="_blank">
                <div class="icon-box"><img src="https://api.iconify.design/logos:google-gmail.svg" alt="Gmail"></div>
                <span>Gmail</span>
            </a>
        </div>

        <!-- UC / Firefox Style Privacy Banner -->
        <div class="privacy-banner">
            <div class="privacy-text">
                <h4>Private Browsing Mode</h4>
                <p>No search history, cookies or cache are saved.</p>
            </div>
            <button class="privacy-badge" onclick="alert('Incognito active: Browsing secure.')">PRO ON</button>
        </div>
    </div>

    <div class="footer">
        Powered by Mugdho Portal • UC & Firefox Hybrid UI
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const searchEngine = document.getElementById('searchEngine');
        const searchInput = searchForm.querySelector('.search-input');

        searchEngine.addEventListener('change', function() {
            searchForm.action = this.value;
        });

        searchForm.addEventListener('submit', function(e) {
            if(searchEngine.value.includes('youtube')) {
                searchInput.name = 'search_query';
            } else {
                searchInput.name = 'q';
            }
        });

        function toggleIncognito() {
            alert('Incognito Mode Enabled! Your browsing session is now private.');
            document.body.style.background = 'linear-gradient(135deg, #050505, #121212, #000000)';
        }

        function toggleDesktopSite() {
            let currentWidth = document.querySelector('.container').style.maxWidth;
            if(currentWidth === '100%') {
                document.querySelector('.container').style.maxWidth = '650px';
                alert('Switched to Mobile View Layout.');
            } else {
                document.querySelector('.container').style.maxWidth = '100%';
                alert('Switched to Desktop Site View Mode.');
            }
        }
    </script>
</body>
</html>
