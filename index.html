<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mugdho Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.04);
            --card-hover: rgba(255, 255, 255, 0.08);
            --accent-glow: #00f2fe;
            --text-color: #ffffff;
            --text-secondary: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 90px;
            overflow-x: hidden;
        }

        /* Header Logo */
        .header-logo {
            margin-top: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header-logo .bot-icon-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: -5px;
        }
        .header-logo h1 {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            background: linear-gradient(45deg, #00f2fe, #ff0844);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 400;
        }

        /* Top Action Buttons */
        .top-actions {
            display: flex;
            gap: 6px;
            margin: 12px 0;
            overflow-x: auto;
            max-width: 95%;
            padding: 6px 10px;
            scrollbar-width: none;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
        }
        .top-actions::-webkit-scrollbar {
            display: none;
        }
        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 5px 10px;
            border-radius: 14px;
            color: var(--text-color);
            font-size: 0.68rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            white-space: nowrap;
        }
        .action-btn.active {
            border-color: var(--accent-glow);
            background: rgba(0, 242, 254, 0.1);
        }

        /* Search Bar */
        .search-container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 8px 14px;
            margin-bottom: 18px;
        }
        .google-brand {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #4285F4;
            cursor: pointer;
            margin-right: 8px;
        }
        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 0.82rem;
            outline: none;
        }
        .search-input::placeholder {
            color: var(--text-secondary);
        }
        .search-tools {
            display: flex;
            gap: 10px;
            align-items: center;
            opacity: 0.8;
        }

        /* Shortcuts Grid */
        .shortcuts-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 600px;
            margin-bottom: 20px;
        }
        .shortcut-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 12px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            color: var(--text-color);
        }
        .shortcut-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 1rem;
        }
        .shortcut-title {
            font-size: 0.68rem;
            color: var(--text-secondary);
        }

        /* Feed Section */
        .feed-header {
            width: 90%;
            max-width: 600px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 10px;
            font-size: 0.75rem;
            color: var(--accent-glow);
            font-weight: 500;
        }

        .feed-container {
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .feed-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
        }
        .feed-thumb {
            width: 100%;
            height: 150px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .play-overlay {
            width: 36px;
            height: 36px;
            background: rgba(0, 0, 0, 0.5);
            border: 1.5px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.75rem;
        }
        .feed-content {
            padding: 10px 12px;
        }
        .feed-title {
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .feed-meta {
            font-size: 0.65rem;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(11, 15, 25, 0.96);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
            z-index: 1000;
        }
        .nav-item {
            background: none;
            border: none;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.62rem;
            cursor: pointer;
        }
        .nav-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
        .nav-item.active {
            color: var(--accent-glow);
        }
    </style>
</head>
<body>

    <!-- Header Logo -->
    <div class="header-logo">
        <div class="bot-icon-img">🤖</div>
        <h1>Mugdho Portal</h1>
    </div>

    <!-- Top Action Buttons -->
    <div class="top-actions">
        <button class="action-btn" id="vpnBtn" onclick="toggleVPN()">🛡️ VPN Off</button>
        <button class="action-btn" id="incognitoBtn" onclick="toggleIncognito()">🕵️ Incognito</button>
        <button class="action-btn" id="desktopBtn" onclick="toggleDesktop()">💻 Desktop</button>
        <button class="action-btn" onclick="alert('History opened')">🕒 History</button>
        <button class="action-btn" onclick="alert('Bookmark added')">⭐ Bookmark</button>
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <div class="google-brand" onclick="window.location.href='https://www.google.com'">
            Google
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="Google এ সার্চ করুন অথবা URL লিখুন..." onkeypress="handleSearch(event)">
        <div class="search-tools">
            <span>🎤</span>
            <span>📷</span>
        </div>
    </div>

    <!-- Shortcuts Grid -->
    <div class="shortcuts-grid">
        <a href="https://chatgpt.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(16, 163, 127, 0.15); color: #10a37f;">🤖</div>
            <span class="shortcut-title">ChatGPT</span>
        </a>
        <a href="https://gemini.google.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(79, 172, 254, 0.15); color: #4facfe;">✨</div>
            <span class="shortcut-title">Gemini</span>
        </a>
        <a href="https://github.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(255, 255, 255, 0.08); color: #fff;">🐙</div>
            <span class="shortcut-title">GitHub</span>
        </a>
        <a href="https://youtube.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(255, 0, 0, 0.15); color: #ff0000;">▶️</div>
            <span class="shortcut-title">YouTube</span>
        </a>
        <a href="https://facebook.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(24, 119, 242, 0.15); color: #1877f2;">👥</div>
            <span class="shortcut-title">Facebook</span>
        </a>
        <a href="https://whatsapp.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(37, 211, 102, 0.15); color: #25d366;">💬</div>
            <span class="shortcut-title">WhatsApp</span>
        </a>
        <a href="https://vercel.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(255, 255, 255, 0.08); color: #fff;">▲</div>
            <span class="shortcut-title">Vercel</span>
        </a>
        <a href="https://gmail.com" class="shortcut-card">
            <div class="shortcut-icon" style="background: rgba(234, 67, 53, 0.15); color: #ea4335;">✉️</div>
            <span class="shortcut-title">Gmail</span>
        </a>
    </div>

    <!-- Feed Section -->
    <div class="feed-header">
        <span>📰</span> Google Discover & Trending Live Feed
    </div>

    <div class="feed-container" id="feedContainer"></div>

    <!-- Bottom Navigation Bar -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="history.back()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back
        </button>
        <button class="nav-item" onclick="history.forward()">
            <svg viewBox="0 0 24 24"><path d="M4 11h12.17l-5.58-5.59L12 4l8 8-8 8-1.41-1.41L16.17 13H4v-2z"/></svg>
            Forward
        </button>
        <button class="nav-item" onclick="alert('1 tab open')">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            Tabs
        </button>
        <button class="nav-item" onclick="alert('Recent menu')">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
            Tools
        </button>
        <button class="nav-item active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            Home
        </button>
    </div>

    <script>
        const feedDatabase = [
            {
                title: "2026 FIFA World Cup: Global Teams Gear Up for the Ultimate Clash in North America",
                category: "Sports • 1 hour ago",
                image: "https://images.unsplash.com/photo-1508098682722-e99c43a406b2?auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "Bangladesh Tech Sector Expands Rapidly with Next-Gen AI and Software Innovations",
                category: "Technology • 3 hours ago",
                image: "https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "Top 10 Thriller & Horror Masterpieces You Need to Watch This Season",
                category: "Entertainment & Movies • 4 hours ago",
                image: "https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "Global Stock Markets React to Latest Breakthroughs in Artificial Intelligence",
                category: "World Business • 5 hours ago",
                image: "https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=600&q=80"
            },
            {
                title: "Exploring the Scenic Beauty and Modern Growth of Khulna Division",
                category: "National • 6 hours ago",
                image: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=600&q=80"
            }
        ];

        function loadFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = '';
            feedDatabase.forEach(item => {
                const card = document.createElement('div');
                card.className = 'feed-card';
                card.innerHTML = `
                    <div class="feed-thumb" style="background-image: url('${item.image}')">
                        <div class="play-overlay">▶</div>
                    </div>
                    <div class="feed-content">
                        <div class="feed-title">${item.title}</div>
                        <div class="feed-meta">
                            <span>${item.category}</span>
                            <span>Google Discover</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = loadFeed;

        function handleSearch(event) {
            if (event.key === 'Enter') {
                let query = document.getElementById('searchInput').value.trim();
                if (query) {
                    if (query.startsWith('http://') || query.startsWith('https://') || (query.includes('.') && !query.includes(' '))) {
                        window.location.href = query.startsWith('http') ? query : 'https://' + query;
                    } else {
                        window.location.href = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                    }
                }
            }
        }

        let vpnOn = false;
        function toggleVPN() {
            vpnOn = !vpnOn;
            const btn = document.getElementById('vpnBtn');
            btn.innerHTML = vpnOn ? '🛡️ VPN On' : '🛡️ VPN Off';
            btn.classList.toggle('active', vpnOn);
        }

        let incognitoOn = false;
        function toggleIncognito() {
            incognitoOn = !incognitoOn;
            const btn = document.getElementById('incognitoBtn');
            btn.innerHTML = incognitoOn ? '🕵️ Incognito On' : '🕵️ Incognito';
            btn.classList.toggle('active', incognitoOn);
        }

        let desktopOn = false;
        function toggleDesktop() {
            desktopOn = !desktopOn;
            const btn = document.getElementById('desktopBtn');
            btn.innerHTML = desktopOn ? '💻 Desktop On' : '💻 Desktop';
            btn.classList.toggle('active', desktopOn);
        }
    </script>
</body>
</html>
